spring.application.name=LibriVeritasApp
environment.name=DEV

# Configuraçăo do banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/LibriVeritasDB
spring.datasource.username=postgres
spring.datasource.password=adm123

# Driver JDBC
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraçőes opcionais
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.hibernate.ddl-auto=update

# Pool de conexőes (opcional)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
